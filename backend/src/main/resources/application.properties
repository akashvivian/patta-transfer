# Server Port Configuration
server.port=8080

# Database Configuration (MySQL)
# Note: Ensure MySQL is running on port 3306. 
# Spring Boot will automatically create the 'patta_transfer' database if it doesn't exist.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/patta_transfer?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA and Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configurations
# Maximum size allowed for uploaded files: 3MB
spring.servlet.multipart.max-file-size=3MB
# Maximum request size (including multiple files): 10MB
spring.servlet.multipart.max-request-size=10MB

# Custom File Storage Configuration
# The folder where uploaded documents (PDF, JPG, PNG) will be stored relative to the project directory
app.upload.dir=uploads
